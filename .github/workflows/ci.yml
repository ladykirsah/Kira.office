name: CI

# Least-privilege default for every job (CodeQL flags workflows without an explicit permissions
# block). Nothing here writes to the repo via GITHUB_TOKEN; deploys use the Cloudflare secrets.
permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test

  # Auto-deploy the API Worker (kira-office) to prod after checks pass on main.
  # Requires the CLOUDFLARE_API_TOKEN repo secret (a GoGoCash Workers+DNS-edit token; account id is
  # in wrangler.jsonc). Missing token FAILS LOUDLY — a green "deploy" that silently skipped once let
  # merged code sit undeployed for weeks (2026-07). But wrangler also exits non-zero when it can't
  # re-assert the api.homeseeker.me custom domain even though the code deployed fine; that specific
  # wart (needs a dashboard fix) is tolerated so it doesn't mask real deploy failures with red.
  deploy:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Deploy API Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::error::CLOUDFLARE_API_TOKEN is not set — the API Worker was NOT deployed; main is not live. Add a GoGoCash Workers-edit token as the CLOUDFLARE_API_TOKEN repo secret."
            exit 1
          fi
          set +e
          out=$(npm run deploy -- --env="" 2>&1)
          code=$?
          echo "$out"
          if [ $code -eq 0 ]; then exit 0; fi
          # The code uploaded + deployed, but wrangler couldn't re-assert the custom domain. Treat
          # as success (with a warning) — do NOT let this known wart hide a genuine deploy failure.
          if echo "$out" | grep -q "Deployed kira-office"; then
            echo "::warning::API code deployed, but wrangler could not re-assert the api.homeseeker.me custom domain (known — needs a Cloudflare dashboard fix). Not failing the run."
            exit 0
          fi
          echo "::error::API Worker deploy failed (beyond the custom-domain step)."
          exit 1

  # Auto-deploy the admin (kiraoffice-admin) via OpenNext after checks pass on main.
  # It shares CLOUDFLARE_API_TOKEN with the api job: the admin is on the SAME GoGoCash account
  # (187ab61e… in apps/admin/wrangler.jsonc) and the SAME homeseeker.me zone, so a second token
  # bought no isolation — and the old CF_ADMIN_API_TOKEN was never set, which silently left every
  # merged admin change undeployed behind a green check (PR #27 needed a manual deploy).
  # Same contract as the api job: missing token FAILS LOUDLY; the known custom-domain re-assert
  # wart is tolerated with a warning so it can't mask a genuine deploy failure.
  deploy-admin:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Deploy admin (OpenNext)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::error::CLOUDFLARE_API_TOKEN is not set — the admin was NOT deployed; admin.homeseeker.me is still serving the previous build."
            exit 1
          fi
          set +e
          out=$(npm run deploy -w @l-shopee/admin 2>&1)
          code=$?
          echo "$out"
          if [ $code -eq 0 ]; then exit 0; fi
          # Code uploaded + deployed, but wrangler couldn't re-assert the custom domain — same known
          # wart the api job tolerates. Warn, don't fail; anything else is a real deploy failure.
          if echo "$out" | grep -q "Deployed kiraoffice-admin"; then
            echo "::warning::Admin code deployed, but wrangler could not re-assert the admin.homeseeker.me custom domain (known — needs a Cloudflare dashboard fix). Not failing the run."
            exit 0
          fi
          echo "::error::Admin deploy failed (beyond the custom-domain step)."
          exit 1
