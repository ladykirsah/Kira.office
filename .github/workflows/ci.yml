name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test

  # Auto-deploy the API Worker (kira-office) to prod after checks pass on main.
  # Gated on the CLOUDFLARE_API_TOKEN repo secret: until it is set, this step skips and CI stays
  # green. Account id is in wrangler.jsonc, so the token just needs Workers + DNS edit on that
  # account. The admin (apps/admin) lives on a DIFFERENT Cloudflare account — see deploy-admin.
  deploy:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Deploy API Worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::warning::CLOUDFLARE_API_TOKEN secret not set — skipping Worker deploy."
            exit 0
          fi
          npm run deploy -- --env=""

  # Auto-deploy the admin (kiraoffice-admin) via OpenNext after checks pass on main.
  # It lives on a SEPARATE Cloudflare account (account id is in apps/admin/wrangler.jsonc), so it
  # uses its own CF_ADMIN_API_TOKEN secret — until that is set this skips and CI stays green. The
  # admin only has an assets binding and no custom domain yet, so the token needs Workers edit on
  # that account. Built with NEXT_PUBLIC_API_BASE unset, so the deployed admin calls the prod API.
  deploy-admin:
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Deploy admin (OpenNext)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_ADMIN_API_TOKEN }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::warning::CF_ADMIN_API_TOKEN secret not set — skipping admin deploy."
            exit 0
          fi
          npm run deploy -w @l-shopee/admin
